name: Actualizar predicciones

# Corre solo cada 6 horas, o cuando lo dispares a mano desde la pestaña Actions.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Traer resultados reales (gratis, fuente pública)
        run: |
          curl -s "https://raw.githubusercontent.com/MarianoVilla/Oloraculo/main/README.md" -o /tmp/up.md
          echo "HomeTeam,AwayTeam,HomeGoals,AwayGoals" > OracuMundial2026.Web/Data/played_results.csv
          grep "| FT |" /tmp/up.md \
            | sed -E 's/<img[^>]*>//g; s/\*\*//g' \
            | sed -E "s/^\| *([A-Za-z .'-]+) vs ([A-Za-z .'-]+) \| FT \| ([0-9]+)-([0-9]+).*/\1|\2|\3|\4/" \
            | awk -F'|' '{gsub(/^ +| +$/,"",$1); gsub(/^ +| +$/,"",$2); print $1","$2","$3","$4}' \
            >> OracuMundial2026.Web/Data/played_results.csv
          echo "Resultados reales:" && wc -l OracuMundial2026.Web/Data/played_results.csv

      - name: Restaurar paquetes
        run: dotnet restore OracuMundial2026.sln

      - name: Generar predicciones y reescribir README
        run: dotnet run --project OracuMundial2026.Web -c Release -- --export-readme-snapshots

      - name: Commitear si cambió algo
        run: |
          git config user.name "Jeysshonb"
          git config user.email "Jeysshon@outlook.com"
          if [ -n "$(git status --porcelain README.md OracuMundial2026.Web/Data/played_results.csv)" ]; then
            git add README.md OracuMundial2026.Web/Data/played_results.csv
            git commit -m "Actualiza predicciones"
            git push
          else
            echo "Sin cambios."
          fi
